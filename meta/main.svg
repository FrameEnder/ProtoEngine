<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101218"/>
      <stop offset="1" stop-color="#0e0f13"/>
    </linearGradient>
    <clipPath id="lens"><circle cx="174.0" cy="171" r="6.6"/></clipPath>
    <style>
  text{font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
  .ltr{font-size:64px;font-weight:800;text-anchor:middle}
  @keyframes drop{
    0%   {opacity:0; transform:translateY(-46px) scale(0.6,1.3)}
    45%  {opacity:1; transform:translateY(16px) scale(1.12,0.9)}
    65%  {transform:translateY(-7px) scale(0.97,1.04)}
    82%  {transform:translateY(3px) scale(1,1)}
    100% {transform:translateY(0) scale(1,1)}
  }
  .l0{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.40s both;transform-origin:170.0px 118px}.l1{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.48s both;transform-origin:208.0px 118px}.l2{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.56s both;transform-origin:246.0px 118px}.l3{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.64s both;transform-origin:284.0px 118px}.l4{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.72s both;transform-origin:322.0px 118px}.l5{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.80s both;transform-origin:360.0px 118px}.l6{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.88s both;transform-origin:398.0px 118px}.l7{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.96s both;transform-origin:436.0px 118px}.l8{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 1.04s both;transform-origin:474.0px 118px}.l9{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 1.12s both;transform-origin:512.0px 118px}.l10{animation:drop 0.8s cubic-bezier(0.34,1.56,0.64,1) 1.20s both;transform-origin:550.0px 118px}
  .bar{animation:pop 0.6s cubic-bezier(0.34,1.4,0.64,1) 2.35s both;transform-origin:360.0px 171px}
  @keyframes pop{0%{opacity:0;transform:scale(0.9)}60%{opacity:1;transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}

  .mag{animation:spin 0.6s cubic-bezier(0.34,1.4,0.64,1) 2.5s both, wiggle 0.7s ease-in-out 3.05s both;transform-origin:174.0px 171px}
  @keyframes spin{0%{transform:rotate(-30deg)}60%{transform:rotate(10deg)}100%{transform:rotate(0)}}
  @keyframes wiggle{0%{transform:rotate(0)}20%{transform:rotate(-12deg)}45%{transform:rotate(9deg)}70%{transform:rotate(-5deg)}100%{transform:rotate(0)}}

  /* shine sweeps across the lens during/after the wiggle */
  .shine{opacity:0;animation:shine 0.7s ease-out 3.2s both}
  @keyframes shine{
    0%   {opacity:0; transform:translateX(-11px)}
    30%  {opacity:1}
    100% {opacity:0; transform:translateX(11px)}
  }
  .query{animation:fade 0.5s ease 2.7s both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
</style>
  </defs>
  <rect width="720" height="240" rx="18" fill="url(#bgGrad)"/>

  <!-- Hero word -->
  <text class="ltr l0" x="170.0" y="118" fill="#8ab4f8">P</text><text class="ltr l1" x="208.0" y="118" fill="#f28b82">r</text><text class="ltr l2" x="246.0" y="118" fill="#fdd663">o</text><text class="ltr l3" x="284.0" y="118" fill="#8ab4f8">t</text><text class="ltr l4" x="322.0" y="118" fill="#81c995">o</text><text class="ltr l5" x="360.0" y="118" fill="#8ab4f8">E</text><text class="ltr l6" x="398.0" y="118" fill="#f28b82">n</text><text class="ltr l7" x="436.0" y="118" fill="#fdd663">g</text><text class="ltr l8" x="474.0" y="118" fill="#8ab4f8">i</text><text class="ltr l9" x="512.0" y="118" fill="#81c995">n</text><text class="ltr l10" x="550.0" y="118" fill="#8ab4f8">e</text>

  <!-- Search bar with the tagline as its placeholder text -->
  <g class="bar">
    <rect x="130.0" y="146" width="460" height="50" rx="25" fill="#1b1d22" stroke="#2a2d35" stroke-width="1.5"/>
    <g class="mag">
      <circle cx="174.0" cy="171" r="8" fill="none" stroke="#9aa0a6" stroke-width="2.2"/>
      <line x1="180.0" y1="177" x2="186.0" y2="183" stroke="#9aa0a6" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <!-- shine lives outside .mag so the rotation can't drag it off the clip.
         A static wrapper tilts it diagonally; CSS only animates translateX. -->
    <g clip-path="url(#lens)">
      <g transform="rotate(35 174.0 171)">
        <rect class="shine" x="172.5" y="162" width="3.5" height="18" rx="1.75" fill="#ffffff"/>
      </g>
    </g>
    <text class="query" x="200.0" y="177" font-size="18" fill="#9aa0a6">Search the sites, you actually use.</text>
  </g>
</svg>