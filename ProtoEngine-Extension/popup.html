<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="bar">
    <div class="brand"><span class="brand__dot"></span> ProtoEngine</div>
    <button class="iconbtn" id="settingsBtn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 13a7.6 7.6 0 0 0 0-2l2-1.5-2-3.4-2.3 1a7.6 7.6 0 0 0-1.7-1l-.4-2.6H10.9l-.4 2.6a7.6 7.6 0 0 0-1.7 1l-2.3-1-2 3.4L4.6 11a7.6 7.6 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7.6 7.6 0 0 0 1.7 1l.4 2.6h4.1l.4-2.6a7.6 7.6 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5Z" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
    </button>
  </header>

  <!-- Main submit view -->
  <main id="submitView">
    <div class="preview">
      <span class="preview__fav" id="favWrap"></span>
      <div class="preview__meta">
        <input class="preview__name" id="nameInput" placeholder="Page name" />
        <div class="preview__url" id="urlText"></div>
      </div>
    </div>

    <label class="lbl" for="descInput">Description</label>
    <textarea id="descInput" placeholder="What is this page, and why is it worth saving?"></textarea>

    <label class="lbl" for="tagsInput">Tags</label>
    <input id="tagsInput" placeholder="docs, internal, rust" />
    <div class="hint">Comma-separated. Optional.</div>

    <div class="msg" id="msg"></div>
    <button class="btn btn--primary" id="submitBtn">Add to ProtoEngine</button>
  </main>

  <!-- Settings view -->
  <main id="settingsView" hidden>
    <label class="lbl" for="baseUrl">ProtoEngine URL</label>
    <input id="baseUrl" placeholder="https://ProtoEngine.example.org" />
    <div class="hint">The address of your ProtoEngine instance, no trailing slash.</div>

    <label class="lbl" for="apiKey">API key</label>
    <input id="apiKey" type="password" placeholder="lmn_xxxx_yyyy" />
    <div class="hint">Generate one in ProtoEngine → Account settings → API key.</div>

    <div class="msg" id="settingsMsg"></div>
    <div class="row">
      <button class="btn btn--ghost" id="testBtn">Test</button>
      <button class="btn btn--primary" id="saveBtn">Save</button>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
