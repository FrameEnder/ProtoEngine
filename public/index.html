<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>{{TAB_TITLE}}</title>
  <!-- Critical inline style: applied during initial HTML parse, before
       styles.css loads, so the page never flashes white on reload. -->
  <style>
    html { background: #0e0f13; }
    body { background: #0e0f13; color: #e3e5e8; margin: 0; }
  </style>
  <link rel="stylesheet" href="/styles.css?v={{ASSET_VER}}" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <!-- Per-user background image layer (set via JS when a background exists) -->
  <div class="bglayer" id="bgLayer" aria-hidden="true"></div>
  <!-- Top bar -->
  <header class="topbar" id="topbar">
    <a class="topbar__brand" href="/" aria-label="{{APP_NAME}} home">{{APP_NAME}}</a>
    <div class="topbar__spacer" id="topbarSpacer"></div>
    <button class="iconbtn" id="addBtn" title="Add a website" aria-label="Add a website" hidden>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="usermenu" id="userMenu" hidden>
      <button class="usermenu__trigger" id="userMenuTrigger" aria-haspopup="true" aria-expanded="false">
        <span class="avatar" id="avatar">?</span>
      </button>
      <div class="usermenu__dropdown" id="userMenuDropdown" role="menu" hidden>
        <div class="usermenu__head">
          <div class="usermenu__name" id="menuName"></div>
          <div class="usermenu__role" id="menuRole"></div>
        </div>
        <button class="usermenu__item" id="accountBtn" role="menuitem">Settings</button>
        <button class="usermenu__item usermenu__item--toggle" id="filterToggleBtn" role="menuitemcheckbox" hidden>
          <span id="filterToggleLabel">Filter</span>
          <span class="usermenu__switch" id="filterToggleSwitch" aria-hidden="true"></span>
        </button>
        <button class="usermenu__item" id="logoutBtn" role="menuitem">Sign out</button>
      </div>
    </div>
    <button class="textbtn textbtn--accent" id="signinBtn">Sign in</button>
  </header>

  <!-- Home / search landing -->
  <main class="stage" id="stage">
    <div class="searchrow" id="searchRow">
      <section class="hero" id="hero">
        <h1 class="hero__word" id="heroWord" aria-label="{{APP_NAME}}"></h1>
        <p class="hero__tag" id="heroTag">Search the sites your people actually use.</p>
      </section>

      <form class="searchbar" id="searchForm" role="search" autocomplete="off">
        <svg class="searchbar__icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input class="searchbar__input" id="searchInput" type="text" placeholder="Search names, URLs, descriptions, or tags" aria-label="Search" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="suggestList" />
        <button class="searchbar__clear" id="clearBtn" type="button" aria-label="Clear search" hidden>&times;</button>
        <button class="searchbar__filter iconbtn" id="filterBtn" type="button" title="Filters" aria-label="Filter settings">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M3 5h18M6 12h12M10 19h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="searchbar__go iconbtn" id="searchBtn" type="submit" title="Search" aria-label="Search">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <ul class="suggest" id="suggestList" role="listbox" hidden></ul>
      </form>
    </div>

    <div class="activefilter" id="activeFilter" hidden></div>

    <section class="results" id="results" aria-live="polite"></section>
  </main>

  <!-- Favorites grid (left side, home view only) -->
  <aside class="favpanel" id="favPanel" hidden aria-label="Favorites"></aside>

  <!-- RSS feed side panel (populated when the user has feeds for this view) -->
  <aside class="rsspanel" id="rssPanel" hidden aria-label="RSS feeds"></aside>
  <button class="favtoggle-btn" id="favToggleBtn" type="button" title="Show favorites" aria-label="Show favorites">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M12 3.5l2.6 5.3 5.9.9-4.2 4.1 1 5.8L12 17l-5.3 2.8 1-5.8-4.2-4.1 5.9-.9z" fill="currentColor"/></svg>
  </button>
  <button class="rsstoggle-btn" id="rssToggleBtn" type="button" title="Show feeds" aria-label="Show RSS feeds">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M5 11a9 9 0 0 1 9 9M5 5a15 15 0 0 1 15 15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><circle cx="6" cy="19" r="1.6" fill="currentColor"/></svg>
  </button>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <!-- Modal root -->
  <div class="modal-root" id="modalRoot" hidden></div>

  <!-- Full-page settings view -->
  <div class="settingspage" id="settingsPage" hidden></div>

  <script src="/app.js?v={{ASSET_VER}}" defer></script>
</body>
</html>
